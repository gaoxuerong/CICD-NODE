services:
  mysql:
    image: mysql:8.4
    container_name: cicd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cicd_root_password}
      MYSQL_DATABASE: ${DB_NAME:-cicd}
      MYSQL_USER: ${DB_USER:-cicd}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cicd_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend-node:
    build:
      context: ./backend-node
    container_name: cicd-backend-node
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-30m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-cicd}
      DB_PASSWORD: ${DB_PASSWORD:-cicd_password}
      DB_NAME: ${DB_NAME:-cicd}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health | grep -q 'healthy'"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend-vue
    container_name: cicd-frontend
    restart: unless-stopped
    depends_on:
      backend-node:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: cicd-prometheus
    restart: unless-stopped
    depends_on:
      backend-node:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cicd-alertmanager
    restart: unless-stopped
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-cicd@example.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-ops@example.com}
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    volumes:
      - ./deploy/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.template:ro
      - ./deploy/observability/alertmanager/entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
      - alertmanager-data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  loki:
    image: grafana/loki:3.3.2
    container_name: cicd-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./deploy/observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: cicd-promtail
    restart: unless-stopped
    depends_on:
      - loki
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./deploy/observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/tmp
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cicd-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  mysql-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  promtail-positions:
  grafana-data:
